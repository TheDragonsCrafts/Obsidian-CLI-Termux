name: Release

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_please:
    name: Version and release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update the release PR
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-termux:
    name: Build ${{ matrix.target }}
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            linker: aarch64-linux-android24-clang
          - target: x86_64-linux-android
            linker: x86_64-linux-android24-clang
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.release_sha }}

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Configure Android NDK linker
        shell: bash
        run: |
          toolchain="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          test -x "$toolchain/${{ matrix.linker }}"
          target_env="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          echo "CARGO_TARGET_${target_env}_LINKER=$toolchain/${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Verify tag and package versions match
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release_please.outputs.tag_name }}
        run: |
          package_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"
          test "${RELEASE_TAG#v}" = "$package_version"

      - name: Build locked release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare checksummed asset
        shell: bash
        run: |
          asset="obsidian-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/obsidian" "$asset"
          chmod 755 "$asset"
          sha256sum "$asset" > "$asset.sha256"

      - name: Upload assets to the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release_please.outputs.tag_name }}
        run: |
          asset="obsidian-${{ matrix.target }}"
          gh release upload "$RELEASE_TAG" "$asset" "$asset.sha256"
